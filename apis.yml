aid: enode
url: https://raw.githubusercontent.com/api-evangelist/enode/refs/heads/main/apis.yml
name: Enode
kind: company
description: Enode provides a single API to connect and control electric vehicles,
  chargers, HVAC systems, batteries, solar inverters, and smart meters across more
  than a thousand hardware brands. The energy-transition API links end-user devices
  via OAuth, normalizes telemetry, and exposes smart-charging and device-control
  endpoints for energy apps, VPPs, and home energy management.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Energy
- Electric Vehicles
- EV Charging
- Smart Charging
- Energy Transition
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
