meters:
- name: connected_devices
  description: Count of unique connected devices billed per period; one device per user even if multiple hardware types are linked.
  unit: devices
  aggregation: max
  dimensions:
  - account
  - vendorType
- name: control_actions
  description: Control actions (charge start/stop, max-current, battery mode, HVAC) issued through the API.
  unit: actions
  aggregation: sum
  dimensions:
  - account
  - vendorType
- name: webhook_events
  description: Webhook events dispatched for device and user updates.
  unit: events
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track connected-device counts per vendorType against the negotiated per-device rate.
- name: Allocation
  description: Map connected devices and OAuth clients to internal products and cost centers.
- name: Optimization
  description: Deauthorize and delete inactive users/devices promptly; prefer webhooks over polling to avoid unnecessary load; consolidate multi-device users.
- name: Accountability
  description: Assign owners per product/client; review active device counts monthly against budget and contract commitments.
