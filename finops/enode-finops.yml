description: >-
  FinOps view of Enode spend. Enode bills on a sales-negotiated, per-
  connected-device basis rather than per API call, so cost scales with the
  count of unique connected devices (vehicles, chargers, inverters, batteries,
  HVAC units, meters) rather than request volume. A device is counted once per
  end user even when multiple hardware types are linked. Specific per-device
  rates are not public and are not reconciled here.
notes: >-
  Per-device rates are sales-negotiated and not published; verify with Enode
  during reconciliation. The primary cost driver is connected-device count,
  not request count.
sources:
- https://enode.com/pricing
